[model]
name = unsupervised_translation

[gan]
gan_type = DDPM_DDIM
source_model_type = ffhq256
source_model_path = None
target_model_type = anime256
target_model_path = ckpts/ddpm/anime_ddpm.pt
sample_type = ddim
custom_steps = 1000
eta = 0.1
refine_steps = 100
es_steps = 850

[raw_data]
upsample_temp = 1

[arg_paths]
translate = tasks/translate_ffhq_anime.cfg

[PriorZEnergy]
weight = 1

[evaluation]
evaluator_program = multi_task

[visualization]
visualizer_program = multi_image
