version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cyclediffusion:latest
    container_name: cyclediffusion-container
    volumes:
      - .:/app
      - /mnt/NAS/vr:/mnt/NAS/vr:ro
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - WANDB_MODE=offline
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - RUN_NAME=translate_ffhq256_to_anime256_ddim_eta01
      - SEED=42
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${GPU_ID:-2}']
              capabilities: [gpu]
    ipc: host # Important for multiprocessing/DDP
    stdin_open: true
    tty: true
    working_dir: /app
    command: >
      python -m torch.distributed.launch
      --nproc_per_node 1
      --master_port 1446
      main.py
      --seed 42
      --cfg experiments/translate_ffhq256_to_anime256_ddim_eta01.cfg
      --run_name translate_ffhq256_to_anime256_ddim_eta0142
      --logging_strategy steps
      --logging_first_step true
      --logging_steps 4
      --evaluation_strategy steps
      --eval_steps 50
      --metric_for_best_model CLIPEnergy
      --greater_is_better false
      --save_strategy steps
      --save_steps 50
      --save_total_limit 1
      --load_best_model_at_end
      --gradient_accumulation_steps 4
      --num_train_epochs 0
      --adafactor false
      --learning_rate 1e-3
      --do_eval
      --output_dir output/translate_ffhq256_to_anime256_ddim_eta01423
      --overwrite_output_dir
      --per_device_train_batch_size 1
      --per_device_eval_batch_size 1
      --eval_accumulation_steps 4
      --ddp_find_unused_parameters true
      --verbose true

  app-local:
    build:
      context: .
      dockerfile: Dockerfile
    image: cyclediffusion:latest
    container_name: cyclediffusion-local-container
    volumes:
      - .:/app
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - WANDB_MODE=offline
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - SEED=42
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${GPU_ID:-2}']
              capabilities: [gpu]
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /app
    command: >
      python -m torch.distributed.launch
      --nproc_per_node 1
      --master_port 1447
      main.py
      --seed 42
      --cfg experiments/translate_ffhq_test256_to_anime256_ddim_eta01.cfg
      --run_name translate_ffhq_test256_to_anime256_ddim_eta01
      --logging_strategy steps
      --logging_first_step true
      --logging_steps 4
      --evaluation_strategy steps
      --eval_steps 50
      --metric_for_best_model CLIPEnergy
      --greater_is_better false
      --save_strategy steps
      --save_steps 50
      --save_total_limit 1
      --load_best_model_at_end
      --gradient_accumulation_steps 4
      --num_train_epochs 0
      --adafactor false
      --learning_rate 1e-3
      --do_eval
      --output_dir output/translate_ffhq_test256_to_anime256
      --overwrite_output_dir
      --per_device_train_batch_size 1
      --per_device_eval_batch_size 1
      --eval_accumulation_steps 4
      --ddp_find_unused_parameters true
      --verbose true
